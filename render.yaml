services:
  - type: web
    name: smart1rv
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: SMART1_SUITE_WEBHOOK_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
