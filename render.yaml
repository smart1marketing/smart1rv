services:
  - type: web
    name: smart1rv
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: SMART1_SUITE_WEBHOOK_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Proposal PDF -> Smart 1 Suite media library (populates proposal_pdf_url)
      - key: PROPOSAL_PDF_ENABLED
        value: "true"
      - key: GHL_MEDIA_API_VERSION
        value: "2021-07-28"
      - key: GHL_PRIVATE_INTEGRATION_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
